<!DOCTYPE html>
<html>
<head>
    <title>Request Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">🍱 FOOD SHARING SYSTEM</a>
    <div>
      <a href="index.html" class="btn nav-btn">Home</a>
      <a href="donate.html" class="btn nav-btn">Donate</a>
      <a href="request.html" class="btn nav-btn">Request</a>
      <a href="login.html" class="btn btn-login">Login</a>
    </div>
  </div>
</nav>

<!-- Purani file rakho, FORM replace karo -->

<div class="container mt-5">
    <h2 class="text-center mb-4">Request Food</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- DONATION FORM -->
    <form action="/submit-request" method="POST" class="form-container">
        <div class="mb-3">
            <label class="form-label fw-bold">Your Name / Organization Name</label>
            <input type="text" name="requester_name" class="form-control" 
                   placeholder="Enter your name" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Contact Number</label>
            <input type="tel" name="phone" class="form-control" 
                   placeholder="10 digit mobile number" pattern="[0-9]{10}" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Number of People</label>
            <input type="number" name="people_count" class="form-control" 
                   placeholder="How many people need food?" min="1" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Required Food Type</label>
            <select name="food_type" class="form-control" required>
                <option value="">Select Food Type</option>
                <option value="veg">Vegetarian Food</option>
                <option value="nonveg">Non-Vegetarian Food</option>
                <option value="packed">Packed Food</option>
                <option value="fruits">Fruits & Vegetables</option>
                <option value="any">Any Food</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Delivery Address</label>
            <textarea name="address" class="form-control" rows="3" 
                      placeholder="Where should food be delivered?" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Urgency</label>
            <select name="urgency" class="form-control">
                <option value="normal">Normal (Within 24 hours)</option>
                <option value="urgent">Urgent (Within 2-3 hours)</option>
                <option value="emergency">Emergency (Immediate need)</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Special Requirements (if any)</label>
            <textarea name="requirements" class="form-control" rows="2" 
                      placeholder="Any specific dietary needs?"></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3">Submit Request</button>
    </form>
</div>

<footer>
    © 2026 Digital Food Sharing System
</footer>

</body>
</html>
